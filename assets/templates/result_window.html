<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<link rel='stylesheet' href='__CSS_HL__'>
<link rel='stylesheet' href='__CSS_KATEX__'>
<style>
html, body {
  height: 100%;
  margin: 0;
  background: #ffffff;
  color: #111111;
}

:root {
  --mark-bg: #ffeb3b;
  --mark-bg-dark: #d4af37;
  --mark-fg: #000;

  --link-color: #0645ad;
  --link-color-visited: #0b0080;
  --link-color-dark: #78b7e6;
  --link-color-dark-visited: #78b7e6;

  --sb-track: #ececec;
  --sb-thumb: #9f9f9f;
  --sb-thumb-hover: #8b8b8b;
  --sb-corner: #ececec;
}

a { color: var(--link-color); }
a:visited { color: var(--link-color-visited); }
a:hover { text-decoration: underline; }

body {
  font-family: "Segoe UI", sans-serif;
  font-size: __FONT_SIZE__px;
  overflow: hidden;
}

#main_shell {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
}

#scroll_area {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  padding: 20px;
  padding-top: 60px;
  padding-bottom: 12px;
}

pre {
  background: #f4f4f4;
  padding: 12px;
  border-radius: 4px;
  overflow-x: auto;
  color: #111111;
}

#content { line-height: 1.6; }
#content > :first-child { margin-top: 0 !important; }

#raw_view,
#edit_view {
  display: none;
  white-space: pre-wrap;
  font-family: monospace;
  background: #f8f9fa;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 4px;
  margin-top: 10px;
  color: #111111;
}

#edit_view {
  width: 100%;
  min-height: 250px;
  box-sizing: border-box;
  background: #fff;
  border: 2px solid #0078d4;
  outline: none;
  font-size: 14px;
  resize: none;
  overflow-y: auto;
}

mark { background: var(--mark-bg); color: var(--mark-fg); }

html.dark-mode,
body.dark-mode {
  background: #1e1e1e !important;
  color: #e0e0e0 !important;
}

body.dark-mode pre,
body.dark-mode code,
body.dark-mode #raw_view,
body.dark-mode #edit_view {
  background: #2d2d2d !important;
  color: #e0e0e0 !important;
  border-color: #444 !important;
}

body.dark-mode mark { background: var(--mark-bg-dark); color: var(--mark-fg); }

body.dark-mode .hljs,
body.dark-mode pre code,
body.dark-mode pre code.hljs {
  color: #e0e0e0 !important;
  background: #2d2d2d !important;
}

body.dark-mode .hljs * { color: inherit !important; }

body.dark-mode .katex,
body.dark-mode .katex * {
  color: #e0e0e0 !important;
}

body.dark-mode a,
body.dark-mode a:visited {
  color: var(--link-color-dark) !important;
}

body.dark-mode a:hover {
  color: var(--link-color-dark) !important;
  text-decoration: underline;
}

body.dark-mode {
  --sb-track: #2a2a2a;
  --sb-thumb: #7b7b7b;
  --sb-thumb-hover: #929292;
  --sb-corner: #2a2a2a;
}

#scroll_area,
#debug_bar {
  scrollbar-color: var(--sb-thumb) var(--sb-track);
}

#scroll_area::-webkit-scrollbar,
#debug_bar::-webkit-scrollbar {
  width: 12px;
  height: 12px;
}

#scroll_area::-webkit-scrollbar-track,
#debug_bar::-webkit-scrollbar-track {
  background: var(--sb-track);
}

#scroll_area::-webkit-scrollbar-thumb,
#debug_bar::-webkit-scrollbar-thumb {
  background: var(--sb-thumb);
  border-radius: 10px;
  border: 2px solid var(--sb-track);
}

#scroll_area::-webkit-scrollbar-thumb:hover,
#debug_bar::-webkit-scrollbar-thumb:hover {
  background: var(--sb-thumb-hover);
}

#scroll_area::-webkit-scrollbar-corner,
#debug_bar::-webkit-scrollbar-corner {
  background: var(--sb-corner);
}

#debug_bar {
  flex: 0 0 auto;
  border-top: 1px solid rgba(127, 127, 127, 0.35);
  padding: 4px 10px 6px 10px;
  min-height: 18px;
  max-height: 96px;
  overflow-x: auto;
  overflow-y: auto;
}

#debug_lines {
  white-space: pre;
  font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
  font-size: 11px;
  line-height: 1.25;
  color: #555;
}

body.dark-mode #debug_bar {
  border-top-color: rgba(255, 255, 255, 0.22);
  background: transparent;
}

body.dark-mode #debug_lines {
  color: #cfcfcf;
}
</style>
<script src='__JS_MARKED__'></script>
<script src='__JS_HL__'></script>
<script src='__JS_KATEX__'></script>
<script src='__JS_KATEX_AUTO__'></script>
</head>
<body>

  <div id='scroll_area'>
    <div id='content'><h3>Loading...</h3></div>

</div>

</html>
